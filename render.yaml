services:
  - type: web
    name: dark-gpt
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/healthz
    autoDeploy: true
