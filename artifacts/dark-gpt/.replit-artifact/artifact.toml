kind = "web"
previewPath = "/"
title = "DARK-GPT"
version = "1.0.0"
id = "artifacts/dark-gpt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21715

[services.development]
run = "pnpm --filter @workspace/dark-gpt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dark-gpt", "run", "build" ]
publicDir = "artifacts/dark-gpt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21715"
BASE_PATH = "/"
